<svg xmlns="http://www.w3.org/2000/svg" width="700" height="150" viewBox="0 0 700 150">
  <defs>
    <!-- Modern Tech Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027" />
      <stop offset="50%" stop-color="#203a43" />
      <stop offset="100%" stop-color="#2c5364" />
    </linearGradient>

    <!-- Cool blue accent gradient for the quote line -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff" />
      <stop offset="100%" stop-color="#0072ff" />
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" rx="12" ry="12" fill="url(#bgGrad)" />

  <!-- Accent Line -->
  <rect x="40" y="30" width="6" height="90" rx="3" ry="3" fill="url(#lineGrad)" />

  <!-- Quote Texts -->
  <!-- Chinese bold -->
  <text x="75" y="55" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="28" font-weight="bold" fill="#ffffff" letter-spacing="8" filter="url(#glow)">知 行 合 一</text>
  
  <!-- English italic -->
  <text x="75" y="95" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="18" font-style="italic" fill="#e2e8f0" filter="url(#glow)">" Knowledge and Action are One. "</text>
  
  <!-- Author alignment -->
  <text x="670" y="125" text-anchor="end" font-family="'Segoe UI', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="500" fill="#cbd5e1" filter="url(#glow)">— Wang Yangming (王阳明)</text>
</svg>