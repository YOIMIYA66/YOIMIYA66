<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="160" viewBox="0 0 900 160" role="img" aria-labelledby="title desc">
  <title id="title">知行合一</title>
  <desc id="desc">Knowledge and action are one, by Wang Yangming.</desc>

  <defs>
    <linearGradient id="background" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="52%" stop-color="#123a6f" />
      <stop offset="100%" stop-color="#1f6feb" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#020617" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="900" height="160" rx="8" fill="url(#background)" />
  <rect x="42" y="30" width="5" height="100" rx="2.5" fill="url(#accent)" />

  <text x="78" y="65" font-family="'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', 'Source Han Sans SC', sans-serif" font-size="30" font-weight="700" letter-spacing="9" fill="#ffffff" filter="url(#shadow)">知 行 合 一</text>
  <text x="78" y="104" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-style="italic" fill="#dbeafe">Knowledge and action are one.</text>
  <text x="852" y="130" text-anchor="end" font-family="'Segoe UI', 'Microsoft YaHei', 'PingFang SC', 'Noto Sans CJK SC', sans-serif" font-size="14" font-weight="500" fill="#bfdbfe">— Wang Yangming · 王阳明</text>

  <text x="852" y="34" text-anchor="end" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2" fill="#bae6fd">PHILOSOPHY</text>
  <text x="785" y="106" font-family="Georgia, serif" font-size="82" fill="#ffffff" opacity="0.1">“</text>
</svg>
